<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo HA Website</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #1e40af;
            --bg-color: #f3f4f6;
            --text-color: #1f2937;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            padding: 3rem;
            max-width: 600px;
            width: 90%;
            text-align: center;
            border-top: 5px solid var(--primary-color);
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            font-size: 2.5rem;
        }

        .subtitle {
            color: #6b7280;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .metadata-box {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 2rem;
            text-align: left;
        }

        .metadata-item {
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
        }

        .metadata-item:last-child {
            margin-bottom: 0;
        }

        .label {
            font-weight: 600;
            color: #475569;
            width: 140px;
            display: inline-block;
        }

        .value {
            color: var(--primary-color);
            font-family: monospace;
            background-color: #eff6ff;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 1.1rem;
        }

        .refresh-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 2rem;
            transition: background-color 0.2s ease;
        }

        .refresh-btn:hover {
            background-color: var(--secondary-color);
        }

        .architecture-badges {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .badge {
            background-color: #e2e8f0;
            color: #475569;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Demo HA Website</h1>
        <div class="subtitle">Highly Available Cloud Architecture Assessment By Ajaykumar R 123</div>

        <div class="metadata-box">
            <div class="metadata-item">
                <span class="label">Instance ID:</span>
                <span class="value" id="instance-id">${EC2_INSTANCE_ID}</span>
            </div>
            <div class="metadata-item">
                <span class="label">Availability Zone:</span>
                <span class="value" id="availability-zone">${EC2_AZ}</span>
            </div>
            <div class="metadata-item">
                <span class="label">Container IP:</span>
                <span class="value" id="local-ip">${CONTAINER_IP}</span>
            </div>
        </div>

        <div class="architecture-badges">
            <span class="badge">AWS ALB</span>
            <span class="badge">Auto Scaling</span>
            <span class="badge">Docker</span>
            <span class="badge">Terraform</span>
        </div>

        <button class="refresh-btn" onclick="window.location.reload()">Refresh Page</button>
        <p style="font-size: 0.85rem; color: #94a3b8; margin-top: 1rem;">
            * Refreshing may route you to a different Availability Zone
        </p>
    </div>
</body>

</html>
