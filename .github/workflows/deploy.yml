# CI/CD Pipeline: Build Docker image, test locally, push to ECR, refresh ASG
name: Build and Deploy to AWS HA Architecture

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ha-webapp-repo
  ASG_NAME: ha-webapp-asg

jobs:
  deploy:
    name: Build, Push and Refresh ASG
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build Docker Image
        run: |
          cd docker
          docker build -t ha-webapp-app .

      - name: Test Docker Image Locally
        run: |
          docker run -d --name test-app -p 8080:80 ha-webapp-app
          sleep 5
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8080 | grep 200

      - name: Clean up Test Container
        if: always()
        run: |
          docker rm -f test-app || true

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and Push Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.run_number }}
        run: |
          docker tag ha-webapp-app $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker tag ha-webapp-app $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to Auto Scaling Group (Instance Refresh)
        run: |
          echo "Starting Rolling Instance Refresh for ASG: ${{ env.ASG_NAME }}"
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name ${{ env.ASG_NAME }} \
            --region ${{ env.AWS_REGION }}
          echo "Rolling update initiated successfully!"
